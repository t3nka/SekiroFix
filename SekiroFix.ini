;;;;;;;;;; General ;;;;;;;;;;

[Borderless Windowed]
; Makes windowed mode run in borderless.
Enabled = false

[Gameplay FOV]
; Adjust "Multiplier" to increase/decrease gameplay FOV.
Multiplier = 1.00

[Disable Camera Reset]
; Disables camera centering/reset when lock-on is pressed with no valid target.
Enabled = false

[Auto Loot]
; Automatically picks up/collects enemy loot.
Enabled = false

[Hide Awareness Markers]
; Hides enemy awareness/directional detection markers.
Enabled = true

[Hide Vignettes]
; Hides low-health/dying and stealth screen vignette effects.
; Does not hide black screens or fade transitions.
Enabled = false

[Prevent Dragonrot]
; Prevents Dragonrot from increasing when you die.
Enabled = false

[Disable Death Penalties]
; Prevents Sen and Skill Experience loss when you die.
Enabled = false

[Log Stats]
; Writes DeathCounter.txt and TotalKillsCounter.txt to the game folder every 2 seconds.
; TotalKillsCounter.txt is total kills minus deaths, clamped to 0.
Enabled = false

[Spirit Emblem Upgrade]
; Makes prosthetic skill-tree upgrades increase Spirit Emblem capacity by 1.
; WARNING: This permanently affects save progression once the upgrade is applied.
Enabled = false

[Unlock Framerate]
; Unlocks the 60fps framerate cap.
Enabled = true

;;;;;;;;;; Ultrawide/Narrower ;;;;;;;;;;

[Unlock Resolutions]
; Unlocks resolution list in windowed mode.
Enabled = true

[Fix Aspect Ratio]
; Stops scaling to 16:9 and fixes various aspect ratio related issues.
Enabled = true

[Fix HUD]
; Fixes vignettes and fades at ultrawide/narrower resolutions.
Enabled = true
